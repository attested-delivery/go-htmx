version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - depguard
  settings:
    depguard:
      rules:
        # AD-6 import boundary (see internal/doc.go): platform/web code is
        # infrastructure and must stay leaf-level — it must never import a
        # feature package. Feature packages are top-level dirs under
        # internal/ (internal/<feature>/*, e.g. internal/orders), not
        # nested under a literal "internal/feature/" path, so this is an
        # allow list rather than a deny prefix: depguard's `pkg` matching
        # is prefix-based, and there's no single deny prefix that covers
        # every current/future internal/<feature>/* without also covering
        # (and wrongly blocking) internal/platform/* and internal/web/*
        # themselves. Anything not in this allow list is denied by
        # default — including the first feature package that gets added
        # (Story #4's example feature slice), which is the point: it
        # fails lint immediately rather than being caught later in review.
        platform-no-feature-imports:
          files:
            - "**/internal/platform/**/*.go"
            - "**/internal/web/**/*.go"
          allow:
            - $gostd
            - github.com/attested-delivery/go-htmx/internal/platform
            - github.com/attested-delivery/go-htmx/internal/web
            - github.com/a-h/templ
            - modernc.org/sqlite
            - github.com/pressly/goose/v3
  exclusions:
    rules:
      # Generated templ output; templ itself is the source of truth.
      - path: "_templ\\.go$"
        linters:
          - errcheck
          - staticcheck
          - unused

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
