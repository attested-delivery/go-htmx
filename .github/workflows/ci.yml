name: ci

# Build/lint/test for the Go application itself. Complements
# quality-gates.yml (the org's security/supply-chain gates) — this is the
# "does the code work" check (Story #2, attested-delivery/go-htmx#2).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # templ, sqlc, and golangci-lint are plain Go module installs (pinned
      # exact version), not GitHub Actions, so they carry no allow-list
      # entry — `go install` verifies module integrity against the
      # checksum database the same way `go build` does for any other
      # dependency.
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      # just itself isn't a Go module (it's Rust), so it can't go
      # install like the tools above — download the pinned release
      # binary directly and verify it against its published SHA256
      # checksum before trusting it, same integrity bar as a SHA-pinned
      # Action, without needing a third-party Action (or an allow-list
      # entry) at all.
      - name: Install just
        run: |
          curl -sLo just.tar.gz https://github.com/casey/just/releases/download/1.56.0/just-1.56.0-x86_64-unknown-linux-musl.tar.gz
          echo "fa2a8ec1015d9df5330941ade12437488fc40d33f9c9f8cd4eb70a26de11b639  just.tar.gz" | sha256sum -c -
          tar -xzf just.tar.gz just
          sudo mv just /usr/local/bin/just
          rm just.tar.gz
          just --version

      # Tailwind's standalone CLI isn't a Go module either (nor Rust) —
      # same install-and-verify pattern as just above.
      - name: Install tailwindcss
        run: |
          curl -sLo tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/download/v4.3.2/tailwindcss-linux-x64
          echo "5036c4fb4328e0bcdbb6065c70d8ac9452e0d4c947113a788a8f94fd390425c1  tailwindcss" | sha256sum -c -
          chmod +x tailwindcss
          sudo mv tailwindcss /usr/local/bin/tailwindcss
          tailwindcss --help >/dev/null

      - name: Generate
        run: |
          tailwindcss -i internal/web/assets/tailwind/input.css \
            -o internal/web/assets/static/css/app.css --minify
          templ generate
          sqlc generate
      - name: Verify generation didn't touch tracked files
        # Generated output (_templ.go, internal/platform/db/sqlc/) is
        # gitignored specifically so it's never a source of drift — this
        # only catches the failure mode gitignore itself can't: `sqlc
        # generate`/`templ generate` writing somewhere unexpectedly
        # untracked-but-not-ignored, or into a path that should have been
        # gitignored but isn't. `git status --porcelain` exits 0
        # regardless of output, so the check has to be explicit.
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generation left an untracked/modified file outside .gitignore:"
            git status --porcelain
            exit 1
          fi
      - name: Build
        run: go build ./...
      - name: Lint
        run: golangci-lint run ./...
      - name: Test
        run: go test -race -cover ./...
      - name: Smoke-test template instantiation
        # The template's real acceptance test (Story #6, Task #27): copy
        # the tree, run `just init` with a throwaway identity, build +
        # test the copy, grep-gate for leftover template identity.
        run: just smoke-init

  # Browser-driven E2E tests (Story #78, attested-delivery/go-htmx#78) —
  # a separate job from build-lint-test so a slow/flaky browser download
  # never blocks the fast unit-test signal. The lean Smoke-tagged subset
  # blocks every PR; the full domain set (functional, accessibility,
  # cross-browser, visual regression) runs only on merge to main, matching
  # the industry-norm lean-PR/full-on-merge split for a project this size.
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Install just
        run: |
          curl -sLo just.tar.gz https://github.com/casey/just/releases/download/1.56.0/just-1.56.0-x86_64-unknown-linux-musl.tar.gz
          echo "fa2a8ec1015d9df5330941ade12437488fc40d33f9c9f8cd4eb70a26de11b639  just.tar.gz" | sha256sum -c -
          tar -xzf just.tar.gz just
          sudo mv just /usr/local/bin/just
          rm just.tar.gz
          just --version

      - name: Install tailwindcss
        run: |
          curl -sLo tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/download/v4.3.2/tailwindcss-linux-x64
          echo "5036c4fb4328e0bcdbb6065c70d8ac9452e0d4c947113a788a8f94fd390425c1  tailwindcss" | sha256sum -c -
          chmod +x tailwindcss
          sudo mv tailwindcss /usr/local/bin/tailwindcss
          tailwindcss --help >/dev/null

      # playwright-go's browser-binary download is HTTPS + version-pinned
      # only, not independently checksum-verified like just/tailwindcss
      # above — see AGENTS.md's Toolchain section for the accepted gap.
      - name: Install Playwright browsers
        run: just e2e-install

      - name: E2E smoke tests
        run: just e2e-smoke

      - name: E2E full suite
        if: github.event_name == 'push'
        run: just e2e-full

      # Story #81: e2e/visual writes a diff-overlay PNG next to a failing
      # baseline (e2e/visual/testdata/<name>.diff.png) instead of just a
      # numeric failure — upload it so a failing run's actual visual
      # difference is inspectable without reproducing locally.
      - name: Upload visual regression diffs
        if: failure() && github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-diffs
          path: e2e/visual/testdata/*.diff.png
          if-no-files-found: ignore
