version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/platform/db/query"
    schema: "internal/platform/db/migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/platform/db/sqlc"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
